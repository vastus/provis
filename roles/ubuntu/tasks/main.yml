---
- name: install packages
  become: yes
  become_user: root
  block:
    - name: add node apt repo
      shell: "curl -fsSL https://deb.nodesource.com/setup_22.x | bash -"

    - name: apt
      apt:
        name: "{{ item }}"
        state: latest
      loop:
        - tmux
        - libfuse2
        - nodejs
